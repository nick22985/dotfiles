command_timeout = 1000

## FIRST LINE/ROW: Info & Status
# First param ─┌
[username]
format = " [╭─$user]($style)@"
style_user = "bold red"
style_root = "bold red"
show_always = true

# Second param
[hostname]
format = "[$hostname]($style) in "
style = "bold dimmed red"
trim_at = "-"
ssh_only = false
disabled = false

# Third param
[directory]
disabled = true

[custom.dir]
description = "Worktree-aware directory display"
command = '''
common=$(cd "$(git rev-parse --git-common-dir 2>/dev/null)" 2>/dev/null && pwd)
gitdir=$(cd "$(git rev-parse --git-dir 2>/dev/null)" 2>/dev/null && pwd)
if [ -n "$common" ] && [ "$common" != "$gitdir" ]; then
  case "$common" in
    */.git) repo=$(basename "$(dirname "$common")") ;;
    *)      repo=$(basename "$common") ;;
  esac
  toplevel=$(git rev-parse --show-toplevel)
  rel=${PWD#"$toplevel"}
  echo "${repo}${rel}"
elif [ "$(git rev-parse --is-bare-repository 2>/dev/null)" = "true" ]; then
  echo "$(basename "$PWD")"
else
  toplevel=$(git rev-parse --show-toplevel 2>/dev/null)
  if [ -n "$toplevel" ]; then
    repo=$(basename "$toplevel")
    rel=${PWD#"$toplevel"}
    echo "${repo}${rel}"
  else
    echo "${PWD/#$HOME/~}"
  fi
fi
'''
when = "true"
style = "purple"
format = "[$output]($style) "

[git_branch]
disabled = true

[custom.gitbranch]
description = "Branch display that shows 'bare' in bare repos"
command = '''
if [ "$(git rev-parse --is-bare-repository 2>/dev/null)" = "true" ]; then
  echo "bare"
else
  git rev-parse --abbrev-ref HEAD 2>/dev/null
fi
'''
when = "git rev-parse --git-dir 2>/dev/null"
style = "green"
format = "on [$output]($style) "

# Before all the version info (python, nodejs, php, etc.)
[git_status]
style = "white"
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"

# Last param in the first line/row
[cmd_duration]
min_time = 100
format = "took [$duration]($style) "
disabled = false

## SECOND LINE/ROW: Prompt
# Somethere at the beginning
[battery]
full_symbol = "󰁹 "
charging_symbol = "󰂄 "
discharging_symbol = "󰂃 "
disabled =  true

[[battery.display]]  # "bold red" style when capacity is between 0% and 10%
threshold = 15
style = "bold red"
disabled = true

[[battery.display]]  # "bold yellow" style when capacity is between 10% and 30%
threshold = 50
style = "bold yellow"
disabled =  true

[[battery.display]]  # "bold green" style when capacity is between 10% and 30%
threshold = 80
style = "bold green"
disabled = true

# Prompt: optional param 1
[time]
format = " 🕙 $time($style)\n"
time_format = "%T"
style = "bright-white"
disabled = true

# Prompt: param 2 └─
[character]
success_symbol = " [╰─λ](bold red)"
error_symbol = " [╰─×](bold red)"

[shell]
format = '[$indicator]($style) '
fish_indicator = '󰈺'
powershell_indicator = '_'
unknown_indicator = ''
style = 'cyan bold'
disabled = false

