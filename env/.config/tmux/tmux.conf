set -ga terminal-overrides ",xterm-256color*:Tc"
set-option -a terminal-features ',xterm-256color:RGB'
set-option -ga terminal-features ',xterm*:osc7'
set-option -ga terminal-features ',alacritty*:osc7'
set-option -ga terminal-features ',ghostty*:osc7'
set-option -ga terminal-features ',kitty*:osc7'
set-option -ga terminal-features ',screen*:osc7'
set-option -ga terminal-features ',tmux*:osc7'
set-option -g default-terminal "screen-256color"
set -s escape-time 1
set -g history-limit 50000
set -g display-time 4000
set -g focus-events on
set -g aggressive-resize on
# image support
set -gq allow-passthrough on
set -g visual-activity off


unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
# bind-key c run-shell "tmux-ssh"


# hooks
set-hook -g after-new-window 'run-shell "tmux-ssh-window #{session_name}"'
set-hook -g after-split-window 'run-shell "tmux-ssh-pane #{session_name} #{pane_id}"'
set-hook -g session-closed 'run-shell "~/.local/bin/tmux-on-closed \"#{hook_session_name}\""'
set-hook -g session-created 'run-shell "~/.local/bin/tmux-session-push #{hook_session_name}"'
set-hook -g client-session-changed 'run-shell "~/.local/bin/tmux-on-session-change #{client_session}"'

# dont ask to kill window or pane
bind-key x kill-pane
bind-key & kill-window
bind Q run-shell "~/.local/bin/tmux-switch_and_kill.sh"

# tmux-windowizer "run" "tmux-run $3 $3"
set -g status-style 'bg=#333334 fg=#5eacd3'
set -g status-left-length 30

bind r source-file ~/.config/tmux/tmux.conf
set -g base-index 1

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# vim-like pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

bind-key -r i run-shell "tmux neww tmux-cht.sh"

# In a session that's bound to an SSH host (TMUX_SSH_HOST set by
# tmux-ssh-window/pane), open a new window running local nvim editing
# files on that remote host via scp://.
bind-key E run-shell "tmux-ssh-nvim '#{pane_path}'"

# bind-key -r G run-shell "~/.local/bin/tmux-sessionizer ~/work/nrdp"
# bind-key -r C run-shell "~/.local/bin/tmux-sessionizer ~/work/tvui"
# bind-key -r R run-shell "~/.local/bin/tmux-sessionizer ~/work/milo"
# bind-key -r L run-shell "~/.local/bin/tmux-sessionizer ~/work/hpack"
# bind-key -r H run-shell "~/.local/bin/tmux-sessionizer ~/personal/vim-with-me"
# bind-key -r T run-shell "~/.local/bin/tmux-sessionizer ~/personal/refactoring.nvim"
# bind-key -r N run-shell "~/.local/bin/tmux-sessionizer ~/personal/harpoon"
# bind-key -r S run-shell "~/.local/bin/tmux-sessionizer ~/personal/developer-productivity"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-battery'
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'
set -g @plugin 'b0o/tmux-autoreload'

# run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_status_background "#242638"
set -g @catppuccin_directory_text ""

set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_text "#W"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -gF status-right ""
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -ag status-right "#{E:@catppuccin_status_application}"

set -g status-interval 5

run '~/.config/tmux/plugins/tpm/tpm'
